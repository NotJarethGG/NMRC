# Render blueprint — API NestJS de NMRC
# Conecta este repo en Render (New → Blueprint) y completa las variables marcadas (sync:false).
services:
  - type: web
    name: nmrc-api
    runtime: node
    plan: free
    rootDir: .
    # Fuerza la instalación de dev-deps (nest-cli, prisma, typescript) aunque NODE_ENV=production,
    # compila la API y verifica que el bundle exista (falla ruidoso si no).
    buildCommand: npm install --include=dev && npm run build --workspace @gosthshop/api && test -f apps/api/dist/main.js
    # Arranca el server compilado con ruta explícita (las tablas ya existen en Supabase).
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/products
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Asegura que npm instale las devDependencies (build tools) en Render
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # --- Supabase (pegar en el dashboard de Render) ---
      # DATABASE_URL: conexión POOLED (puerto 6543, ...pooler.supabase.com) + ?pgbouncer=true
      - key: DATABASE_URL
        sync: false
      # DIRECT_URL: conexión DIRECTA (puerto 5432) — la usa Prisma para migraciones/db push
      - key: DIRECT_URL
        sync: false
      # --- Auth ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # --- Pago SINPE / WhatsApp (datos reales NMRC) ---
      - key: SINPE_NUMBER
        value: "8576-3191"
      - key: WHATSAPP_NUMBER
        value: "50685763191"
      # --- Dominios del frontend en Vercel (separados por coma), p.ej.:
      # https://nmrc-storefront.vercel.app,https://nmrc-admin.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # --- URL pública de esta API en Render (imágenes + callback OAuth), p.ej:
      # https://nmrc-api.onrender.com
      - key: PUBLIC_URL
        sync: false
      # --- URL del storefront (destino del redirect OAuth) ---
      - key: FRONTEND_URL
        value: https://nmrc-storefront.vercel.app
      # --- URL del panel admin (destino del redirect OAuth cuando state=admin) ---
      - key: ADMIN_URL
        value: https://nmrc-admin.vercel.app
      # --- Correos que entran como ADMIN al usar Google (separados por coma) ---
      - key: ADMIN_EMAILS
        value: nmrcwear@gmail.com
      # --- OAuth Google: credenciales de console.cloud.google.com ---
      # Redirect URI autorizada: https://nmrc-api.onrender.com/api/auth/google/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # --- Cloudinary (dashboard de cloudinary.com) ---
      - key: CLOUDINARY_CLOUD_NAME
        value: ds2z843sd
      - key: CLOUDINARY_API_KEY
        value: "358738713244282"
      # El API secret NO se versiona: pégalo en el dashboard de Render
      - key: CLOUDINARY_API_SECRET
        sync: false
      # --- Moneda: colones por 1 USD (debe coincidir con VITE_USD_RATE del storefront) ---
      - key: USD_RATE
        value: "510"
      # --- Stripe (dashboard.stripe.com → Developers → API keys) ---
      # Si se dejan vacías, el checkout usa solo SINPE (fallback automático).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Webhook secret (whsec_...): crear endpoint .../api/payments/webhook en Stripe,
      # evento payment_intent.succeeded. OPCIONAL: el front confirma vía /payments/confirm.
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # --- PayPal (developer.paypal.com → Apps & Credentials) — opera en Costa Rica ---
      # PAYPAL_ENV: "sandbox" (demo) o "live" (producción). Sin llaves, se oculta PayPal.
      - key: PAYPAL_ENV
        value: sandbox
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      # --- Resend (resend.com → API Keys) para correos transaccionales ---
      # Sin clave, los correos se omiten (no-op). MAIL_FROM debe ser un dominio verificado.
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: "NMRC <onboarding@resend.dev>"
